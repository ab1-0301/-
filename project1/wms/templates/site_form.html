{% extends "base.html" %}
{% block title %}{{ '编辑' if site else '新建' }}项目地{% endblock %}
{% block content %}
<div class="card" style="max-width:500px">
    <h2>{{ '✏️ 编辑项目地' if site else '🏗️ 新建项目地' }}</h2>
    <form method="POST">
        <div class="form-group">
            <label>项目地名称 *</label>
            <input type="text" name="name" required value="{{ site.name if site else '' }}" placeholder="如 郑州东区项目">
        </div>
        <div class="form-group">
            <label>所在地</label>
            <input type="text" name="location" value="{{ site.location if site else '' }}" placeholder="如 郑州市郑东新区">
        </div>
        <div class="form-group">
            <label>联系人</label>
            <input type="text" name="contact" value="{{ site.contact if site else '' }}" placeholder="如 张三">
        </div>
        <div style="display:flex;gap:8px;margin-top:8px">
            <button type="submit" class="btn btn-primary">{{ '保存' if site else '创建' }}</button>
            <a href="{{ url_for('index') }}" class="btn btn-outline">取消</a>
        </div>
    </form>
</div>
{% endblock %}
