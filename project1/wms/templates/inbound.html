{% extends "base.html" %}
{% block title %}物资入库{% endblock %}
{% block content %}
<div class="card" style="max-width:500px">
    <h2>📥 物资入库</h2>
    <form method="POST">
        <div class="form-group">
            <label>物资编码 *</label>
            <input type="text" name="code" required placeholder="如 MAT-001">
        </div>
        <div class="form-group">
            <label>物资名称 *</label>
            <input type="text" name="name" required placeholder="如 电阻器">
        </div>
        <div class="grid-2">
            <div class="form-group">
                <label>规格</label>
                <input type="text" name="spec" placeholder="如 100Ω">
            </div>
            <div class="form-group">
                <label>单位</label>
                <input type="text" name="unit" value="个" placeholder="个/箱/kg">
            </div>
        </div>
        <div class="grid-2">
            <div class="form-group">
                <label>数量 *</label>
                <input type="number" name="quantity" required min="1" value="1">
            </div>
            <div class="form-group">
                <label>库位</label>
                <input type="text" name="location" placeholder="如 A-01-03">
            </div>
        </div>
        <div class="form-group">
            <label>操作人</label>
            <input type="text" name="operator" placeholder="张照航">
        </div>
        <button type="submit" class="btn btn-primary" style="width:100%;margin-top:8px">确认入库</button>
    </form>
</div>
{% endblock %}
