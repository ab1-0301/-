{% extends "base.html" %}
{% block title %}物资出库{% endblock %}
{% block content %}
<div class="card" style="max-width:500px">
    <h2>📤 物资出库</h2>
    <form method="POST">
        <div class="form-group">
            <label>选择物资</label>
            <select name="code" required>
                <option value="">-- 请选择 --</option>
                {% for m in materials %}
                <option value="{{ m.code }}" data-qty="{{ m.quantity }}">
                    {{ m.code }} — {{ m.name }}（库存：{{ m.quantity }}{{ m.unit }}）
                </option>
                {% endfor %}
            </select>
        </div>
        <div class="form-group">
            <label>出库数量 *</label>
            <input type="number" name="quantity" required min="1" value="1">
        </div>
        <div class="form-group">
            <label>操作人</label>
            <input type="text" name="operator" placeholder="张照航">
        </div>
        <button type="submit" class="btn btn-primary" style="width:100%;margin-top:8px">确认出库</button>
    </form>
</div>
{% if not materials %}
<div class="flash error" style="margin-top:16px">暂无库存物资，请先入库</div>
{% endif %}
{% endblock %}
